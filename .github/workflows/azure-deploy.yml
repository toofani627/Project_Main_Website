# GitHub Actions workflow for deploying this Node.js app to Azure App Service.
# Add the AZURE_WEBAPP_PUBLISH_PROFILE secret via Settings → Secrets → Actions → New repository secret.
# Redeploy anytime by pushing updates to the main branch, which reruns this workflow.

name: Deploy to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_WEBAPP_NAME: Firstaiprojectgroup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build application (optional)
        run: npm run build || echo "no build step"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
